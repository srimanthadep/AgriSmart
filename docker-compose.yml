version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: agrismart_postgres
    environment:
      POSTGRES_DB: agrismart_db
      POSTGRES_USER: agrismart_user
      POSTGRES_PASSWORD: agrismart_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - agrismart_network
    restart: unless-stopped

  # Redis for caching and session storage
  redis:
    image: redis:7-alpine
    container_name: agrismart_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - agrismart_network
    restart: unless-stopped

  # Main Flask Application
  app:
    build: .
    container_name: agrismart_app
    environment:
      - FLASK_APP=app_modern.py
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://agrismart_user:agrismart_password@postgres:5432/agrismart_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-super-secret-key-change-this-in-production
      - JWT_SECRET_KEY=your-jwt-secret-key-change-this-in-production
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    networks:
      - agrismart_network
    restart: unless-stopped
    command: >
      sh -c "flask db upgrade &&
             python app_modern.py"

  # Celery Worker for background tasks
  celery_worker:
    build: .
    container_name: agrismart_celery_worker
    environment:
      - FLASK_APP=app_modern.py
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://agrismart_user:agrismart_password@postgres:5432/agrismart_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    networks:
      - agrismart_network
    restart: unless-stopped
    command: celery -A app_modern.celery worker --loglevel=info

  # Celery Beat for scheduled tasks
  celery_beat:
    build: .
    container_name: agrismart_celery_beat
    environment:
      - FLASK_APP=app_modern.py
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://agrismart_user:agrismart_password@postgres:5432/agrismart_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    networks:
      - agrismart_network
    restart: unless-stopped
    command: celery -A app_modern.celery beat --loglevel=info

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: agrismart_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./static:/var/www/static
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    networks:
      - agrismart_network
    restart: unless-stopped

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: agrismart_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - agrismart_network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: agrismart_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - agrismart_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  agrismart_network:
    driver: bridge
